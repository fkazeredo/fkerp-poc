<header class="page-head">
  <div>
    <h1>Bem-vindo ao FKERP</h1>
    <p class="sub muted">Escolha um módulo para começar.</p>
  </div>
</header>

@if (modules.length === 0) {
  <div class="notice surface">
    <i class="pi pi-lock"></i>
    <span>Você ainda não tem acesso a nenhum módulo. Fale com o administrador.</span>
  </div>
}

<div class="home-grid">
  @for (m of modules; track m.id) {
    <a class="tile surface" [routerLink]="m.home">
      <span class="tile-icon" [class]="m.accent"><i [class]="m.icon"></i></span>
      <span class="tile-title">{{ m.title }}</span>
      <span class="tile-desc muted">{{ m.desc }}</span>
    </a>
  }
</div>

<p class="muted home-hint">
  Dica: pressione <span class="kbd">Ctrl</span> <span class="kbd">K</span> para abrir os comandos
  ou <span class="kbd">?</span> para ver todos os atalhos.
</p>
