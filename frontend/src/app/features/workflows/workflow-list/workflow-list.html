<header class="head">
  <h1>Workflows</h1>
  <p class="muted">Os fluxos de trabalho configuráveis — estados, transições e regras de atenção.</p>
</header>

@if (loading()) {
  <p class="muted">Carregando…</p>
} @else if (error()) {
  <p-message severity="error" [text]="error()!" styleClass="w-full" />
} @else if (items().length === 0) {
  <p class="muted">Nenhum workflow configurável.</p>
} @else {
  <div class="grid">
    @for (wf of items(); track wf.code) {
      <button type="button" class="tile" (click)="open(wf.code)">
        <i class="pi pi-sitemap"></i>
        <span class="tile-label">{{ wf.label }}</span>
        <span class="tile-code muted">{{ wf.code }}</span>
      </button>
    }
  </div>
}
