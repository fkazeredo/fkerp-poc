@if (tabs().length === 0) {
  <header class="page-head">
    <div>
      <h1>Indicadores</h1>
      <p class="sub muted">Você não tem acesso a indicadores.</p>
    </div>
  </header>
} @else {
  <div class="hub-tabs" role="tablist" aria-label="Indicadores">
    @for (tab of tabs(); track tab.key) {
      <button
        type="button"
        role="tab"
        class="hub-tab"
        [class.active]="active() === tab.key"
        [attr.aria-selected]="active() === tab.key"
        (click)="select(tab.key)"
      >
        {{ tab.label }}
      </button>
    }
  </div>

  <div class="hub-body">
    @switch (active()) {
      @case ('leads') {
        <app-lead-indicators />
      }
      @case ('oportunidades') {
        <app-opportunity-indicators />
      }
      @case ('propostas') {
        <app-proposal-indicators />
      }
      @case ('pedidos') {
        <app-order-indicators />
      }
      @case ('reservas') {
        <app-booking-indicators />
      }
    }
  </div>
}
