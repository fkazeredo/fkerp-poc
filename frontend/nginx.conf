server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Same-origin proxy to the backend so the httpOnly refresh cookie stays first-party.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashed build assets (file names carry a content hash) are immutable — cache them aggressively so the
    # browser never re-downloads an unchanged bundle.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA: any unknown route falls back to index.html. index.html itself must NOT be cached, so a new release
    # (which references new hashed bundles) is picked up on the next visit — no hard refresh needed.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
}
