spring:
  application:
    name: fkerp-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/erp}
    username: ${SPRING_DATASOURCE_USERNAME:erp}
    password: ${SPRING_DATASOURCE_PASSWORD:erp}
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway é dono do schema
    open-in-view: false
  flyway:
    enabled: true
  modulith:
    detection-strategy: explicitly-annotated
  web:
    locale: pt_BR
    locale-resolver: fixed

app:
  name: FKERP
  version: 0.34.0
  security:
    jwt:
      secret: ${APP_JWT_SECRET:dev-insecure-secret-change-me-please-0123456789-abcdef}
      access-token-ttl: PT15M
      refresh-token-ttl: P14D
    allowed-origin: ${APP_CORS_ORIGIN:http://localhost:4200}
    refresh-cookie:
      name: refresh_token
      secure: ${APP_COOKIE_SECURE:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true   # liveness/readiness em /actuator/health/{liveness,readiness}
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  structured:
    format:
      console: logstash   # logs JSON (coletados pelo Alloy -> Loki)
